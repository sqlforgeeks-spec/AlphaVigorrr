kind = "web"
previewPath = "/"
title = "AlphaVigor"
version = "1.0.0"
id = "artifacts/alphavigor"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18174

[services.development]
run = "pnpm --filter @workspace/alphavigor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/alphavigor", "run", "build" ]
serve = "static"
publicDir = "artifacts/alphavigor/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18174"
BASE_PATH = "/"
